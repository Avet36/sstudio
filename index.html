<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S Design Studio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="logo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0, 0, 0, 0.035) 1px, transparent 1px),
        #f7f7f2;
      background-size: 28px 28px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      color: #111111;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 10px;
      background: #ed1c24;
      pointer-events: none;
      z-index: 2;
      animation: none;
    }

    body::after {
      content: 'S DESIGN STUDIO';
      position: fixed;
      right: 20px;
      bottom: 16px;
      color: rgba(0, 0, 0, 0.08);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.18em;
      pointer-events: none;
      z-index: 0;
      animation: none;
    }

    @keyframes gradientShift1 {
      0%, 100% {
        background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
        transform: translate(0, 0) scale(1);
      }
      25% {
        background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
        transform: translate(-20px, 20px) scale(1.05);
      }
      50% {
        background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
        transform: translate(20px, -20px) scale(1);
      }
      75% {
        background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
        transform: translate(-10px, -10px) scale(1.03);
      }
    }

    @keyframes gradientShift2 {
      0%, 100% {
        background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
        transform: translate(0, 0) scale(1);
      }
      30% {
        background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
        transform: translate(15px, -15px) scale(1.04);
      }
      60% {
        background: radial-gradient(circle, rgba(59, 130, 246, 0.07) 0%, transparent 70%);
        transform: translate(-20px, 15px) scale(0.98);
      }
      100% {
        background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
        transform: translate(0, 0) scale(1);
      }
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 2px solid #111111;
      border-radius: 0;
      padding: 34px;
      text-align: left;
      box-shadow: 14px 14px 0 #111111;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .card::before {
      content: 'CONTACT';
      position: absolute;
      top: 16px;
      right: -34px;
      width: auto;
      height: auto;
      background: #ed1c24;
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.16em;
      padding: 8px 42px;
      transform: rotate(20deg);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 0 24px;
      overflow: hidden;
      border-radius: 0;
      background: #111111;
      border: 6px solid #ed1c24;
      padding: 10px;
      box-shadow: 8px 8px 0 #111111;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(1.1);
    }

    h1 {
      font-size: 42px;
      line-height: 0.92;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: 0;
      color: #111111;
      background: none;
      -webkit-text-fill-color: currentColor;
    }

    .subtitle {
      display: inline-block;
      font-size: 12px;
      color: #111111;
      margin-bottom: 30px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 900;
      border-top: 2px solid #111111;
      border-bottom: 2px solid #111111;
      padding: 8px 0;
    }

    .action-btn {
      display: grid;
      grid-template-columns: 1fr 32px minmax(96px, 132px) 1fr;
      align-items: center;
      gap: 12px;
      width: 100%;
      height: 56px;
      margin-bottom: 12px;
      border-radius: 12px;
      text-decoration: none;
      color: #111111;
      font-weight: 900;
      font-size: 15px;
      background: #ffffff;
      border: 2px solid #111111;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
      backdrop-filter: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 5px 5px 0 #111111;
    }

    /* Compact buttons row (Email + Instagram) */
    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-bottom: 12px;
    }

    .action-btn.compact {
      height: 28px;
      margin-bottom: 0;
      border-radius: 10px;
      font-size: 12px;
      box-shadow: 4px 4px 0 #111111;
      grid-template-columns: 1fr 24px minmax(0, 90px) 1fr;
    }

    .action-btn.compact .action-icon {
      width: 20px;
      height: 20px;
    }

    .action-btn.compact .action-icon svg {
      width: 14px;
      height: 14px;
    }


    button.action-btn {
      font-family: inherit;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #ed1c24;
      transform: translateX(-101%);
      transition: transform 0.18s ease;
    }

    .action-icon {
      grid-column: 2;
      justify-self: center;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
      background: #111111;
      color: #ffffff;
      position: relative;
      z-index: 1;
    }

    .action-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .action-text {
      grid-column: 3;
      justify-self: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .action-btn.whatsapp .action-icon {
      background: #111111;
      color: #ffffff;
    }

    .action-btn.linkedin .action-icon {
      background: #111111;
      color: #ffffff;
    }

    .action-btn.behance .action-icon {
      background: #111111;
      color: #ffffff;
    }

    .action-btn.email .action-icon {
      background: #111111;
      color: #ffffff;
    }

    .action-btn:hover {
      transform: translate(-2px, -2px);
      background: #ffffff;
      color: #ffffff;
      box-shadow: 8px 8px 0 #111111;
    }

    .action-btn:hover::before {
      transform: translateX(0);
    }

    .action-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 #111111;
    }

    .contacts {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .contact-item {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px 14px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.04) 100%);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .contact-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .contact-number {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: #ffffff;
    }

    .footer {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 2px solid #111111;
      font-size: 12px;
      color: #111111;
      letter-spacing: 0.08em;
      font-weight: 900;
      text-align: right;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 22px;
        box-shadow: 8px 8px 0 #111111;
      }

      h1 {
        font-size: 34px;
      }

      .action-btn {
        height: 50px;
        font-size: 14px;
        box-shadow: 4px 4px 0 #111111;
      }
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(17, 17, 17, 0.82);
      animation: fadeIn 0.3s ease;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-content {
      background: #ffffff;
      border: 2px solid #111111;
      border-radius: 0;
      padding: 40px 32px;
      text-align: left;
      box-shadow: 10px 10px 0 #111111;
      max-width: 380px;
      width: 90%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-title {
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      margin-bottom: 24px;
      color: #111111;
      background: none;
      -webkit-text-fill-color: currentColor;
    }

    .phone-option {
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-radius: 0;
      text-decoration: none;
      color: #111111;
      font-weight: 900;
      font-size: 16px;
      background: #ffffff;
      border: 2px solid #111111;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      box-shadow: 4px 4px 0 #111111;
    }

    .phone-icon {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
      margin-right: 10px;
      background: #111111;
      color: #ffffff;
      flex: 0 0 auto;
    }

    .phone-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .phone-option:hover {
      background: #ed1c24;
      color: #ffffff;
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 #111111;
    }

    .close-modal {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      border-radius: 0;
      background: #111111;
      border: 2px solid #111111;
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .close-modal:hover {
      background: #ed1c24;
      color: #ffffff;
    }
  </style>
</head>

  <script>
    function openPhoneModal() {
      document.getElementById('phoneModal').classList.add('active');
    }

    function closePhoneModal() {
      document.getElementById('phoneModal').classList.remove('active');
    }

    // Close modal on outside click
    document.getElementById('phoneModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closePhoneModal();
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closePhoneModal();
      }
    });
  </script>
